<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zerocache | no cache, no limits.</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');

* { box-sizing: border-box; cursor: none !important; }

body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at top, #111, #000);
  font-family: 'Inter', sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* BOOT */
.boot {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 20;
}
.boot h1 {
  font-size: clamp(32px, 8vw, 48px);
  letter-spacing: 4px;
  animation: glitch 1.5s infinite;
}
.boot p { margin-top: 12px; opacity:.7; font-family: monospace; }

@keyframes glitch {
  0% { text-shadow: 2px 0 white, -2px 0 white; }
  50% { text-shadow: -2px -2px white, 2px 2px white; }
  100% { text-shadow: none; }
}

/* GRID */
.pixels {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 22px 22px;
  animation: drift 40s linear infinite;
}
@keyframes drift { to { transform: translate(-200px,-200px); } }

/* CARD */
.card {
  position: relative;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 20px;
  padding: 24px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.7);
  z-index: 2;
  display:none;
}

h1 { margin:0; letter-spacing:1px; }
.tagline { font-size:13px; opacity:.7; margin-bottom:18px; }

input, textarea {
  width:100%;
  padding:12px;
  margin:6px 0;
  background:transparent;
  border:1px solid rgba(255,255,255,.25);
  border-radius:12px;
  color:white;
  outline:none;
  font-size:14px;
}

textarea { resize:none; height:60px; }

button {
  width:100%;
  padding:14px;
  margin-top:14px;
  border-radius:14px;
  border:none;
  background:white;
  color:black;
  font-weight:600;
}

/* TERMINAL */
.terminal-overlay {
  position: fixed;
  inset:0;
  background: rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:10;
  padding:12px;
}

.terminal {
  width:100%;
  max-width:700px;
  background:#000;
  border:1px solid white;
  padding:16px;
  font-family: monospace;
  font-size: clamp(12px, 3vw, 14px);
}

.terminal-header {
  border-bottom:1px solid white;
  padding-bottom:6px;
  margin-bottom:10px;
  text-align:center;
}

.terminal-line { margin:5px 0; }

/* LOADER - bouncing blocks */
.loader {
  display:flex;
  justify-content: space-between;
  margin-top:10px;
  width:60px;
  height:12px;
}
.loader span {
  display:block;
  width:10px;
  height:10px;
  background:white;
  animation:bounce 0.3s infinite ease-in-out;
}
.loader span:nth-child(2){ animation-delay:0.05s; }
.loader span:nth-child(3){ animation-delay:0.1s; }
.loader span:nth-child(4){ animation-delay:0.15s; }
.loader span:nth-child(5){ animation-delay:0.2s; }

@keyframes bounce {
  0%, 80%, 100% { transform: scaleY(0.3); }
  40% { transform: scaleY(1); }
}

/* CURSOR */
.cursor {
  position: fixed;
  width:10px;
  height:10px;
  pointer-events:none;
  transform: translate(-50%,-50%);
  z-index:9999;
}
.cursor-inner { width:100%; height:100%; background:white; border-radius:3px; }
.cursor-middle {
  position:absolute; top:-6px; left:-6px;
  width:22px; height:22px;
  border:1px solid white;
  transform:rotate(45deg);
  animation: spin 6s linear infinite;
}
.cursor-outer {
  position:absolute; top:-12px; left:-12px;
  width:34px; height:34px;
  border:1px dashed rgba(255,255,255,.3);
  border-radius:50%;
}
@keyframes spin { to { transform: rotate(360deg); } }
.cursor.click .cursor-inner { transform: scale(0.5); }

@media(max-width:500px){
  .cursor { display:none; }
}
</style>
</head>

<body>

<div class="boot" id="boot">
  <h1>ZEROCACHE</h1>
  <p>no cache, no limits.</p>
  <p>initializing system...</p>
</div>

<div class="pixels"></div>

<div class="card" id="mainCard">
  <h1>ZEROCACHE</h1>
  <div class="tagline">no cache, no limits.</div>

  <form id="regForm">
    <input id="name" placeholder="Full Name" required>
    <input id="email" type="email" placeholder="Email" required>
    <input id="phone" placeholder="Phone Number" required>
    <input id="college" placeholder="College / University" required>
    <input id="course" placeholder="Course" required>
    <input id="year" placeholder="Year" required>
    <textarea id="work" placeholder="Work Details (optional)"></textarea>
    <input id="dob" type="date" required>
    <button type="submit">Join Zerocache</button>
  </form>
</div>

<div class="terminal-overlay" id="terminalOverlay">
  <div class="terminal" id="terminal"></div>
</div>

<div class="cursor" id="cursor">
  <div class="cursor-outer"></div>
  <div class="cursor-middle"></div>
  <div class="cursor-inner"></div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbwKVv_iVLMe7sKx5af-U9QZD7c25K72uFtgJHWl5b839E5la5dmtomZSxYjXh_cYs7u/exec";
const discordURL = "https://discord.gg/Hz3KCKusWz";

/* BOOT */
setTimeout(()=>{
  boot.style.display="none";
  mainCard.style.display="block";
},2000);

/* TERMINAL */
const terminalOverlay = document.getElementById("terminalOverlay");
const terminal = document.getElementById("terminal");

function addLine(text, delay){
  setTimeout(()=>{
    const line = document.createElement("div");
    line.className = "terminal-line";
    line.textContent = "> " + text;
    terminal.appendChild(line);
  }, delay);
}

regForm.addEventListener("submit", e=>{
  e.preventDefault();

  terminalOverlay.style.display="flex";
  terminal.innerHTML = `
    <div class="terminal-header">ZC TERMINAL v1.0</div>
    <div class="loader">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  `;

  fetch(scriptURL,{
    method:"POST",
    body: JSON.stringify({
      name:name.value,
      email:email.value,
      phone:phone.value,
      college:college.value,
      course:course.value,
      year:year.value,
      work:work.value,
      dob:dob.value
    })
  }).then(()=>{
    // loader visually bounces but output is instant
    addLine("boot sequence complete.", 100);
    addLine("encrypting user data...", 300);
    addLine("welcome to zerocache.", 500);
    addLine("redirecting in 3...", 700);
    addLine("2...", 900);
    addLine("1...", 1000);

    setTimeout(()=>{
      window.location.href = discordURL;
    },900);
  });
});

/* PERFECT CURSOR */
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e=>{
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});
document.addEventListener("mousedown", ()=>cursor.classList.add("click"));
document.addEventListener("mouseup", ()=>cursor.classList.remove("click"));

/* STARFIELD */
const starfield = document.querySelector(".pixels");
for(let i=0;i<150;i++){
  const star = document.createElement("div");
  star.className="star";
  star.style.left=Math.random()*100+"vw";
  star.style.top=Math.random()*100+"vh";
  star.style.width=star.style.height="2px";
  star.style.background="white";
  star.style.opacity="0.8";
  star.style.position="absolute";
  star.style.animation=`warp ${Math.random()*3+2}s linear infinite`;
  starfield.appendChild(star);
}
</script>

</body>
</html>
