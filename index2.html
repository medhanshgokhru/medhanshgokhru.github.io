<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zerocache | no cache, no limits</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');

* {
  box-sizing: border-box;
  cursor: none !important; /* kill system cursor everywhere */
}

body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at top, #111, #000);
  font-family: 'Inter', sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* background grid */
.pixels {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 22px 22px;
  animation: drift 40s linear infinite;
}

@keyframes drift {
  from { transform: translate(0,0); }
  to { transform: translate(-200px,-200px); }
}

.card {
  position: relative;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 20px;
  padding: 32px 28px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.7);
  z-index: 2;
}

h1 {
  margin: 0;
  font-weight: 700;
  letter-spacing: 1px;
}

.tagline {
  font-size: 13px;
  opacity: 0.7;
  margin-bottom: 22px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 7px 0;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 12px;
  color: white;
  font-size: 14px;
  outline: none;
  transition: 0.2s ease;
}

input:focus, textarea:focus {
  border-color: white;
  box-shadow: 0 0 6px rgba(255,255,255,0.6);
}

input::placeholder, textarea::placeholder {
  color: rgba(255,255,255,0.5);
}

textarea {
  resize: none;
  height: 60px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 16px;
  border-radius: 14px;
  border: none;
  background: white;
  color: black;
  font-weight: 600;
  letter-spacing: 1px;
  transition: 0.2s;
}

button:hover {
  background: black;
  color: white;
  border: 1px solid white;
}

#status {
  text-align: center;
  margin-top: 12px;
  font-size: 13px;
  opacity: 0.7;
}

/* ===== CUSTOM CURSOR ===== */
.cursor {
  position: fixed;
  width: 10px;
  height: 10px;
  pointer-events: none;
  transform: translate(-50%, -50%);
  z-index: 9999;
}

.cursor-inner {
  width: 100%;
  height: 100%;
  background: white;
  border-radius: 3px;
}

.cursor-middle {
  position: absolute;
  top: -6px;
  left: -6px;
  width: 22px;
  height: 22px;
  border: 1px solid rgba(255,255,255,0.8);
  transform: rotate(45deg);
  animation: spin 6s linear infinite;
}

.cursor-outer {
  position: absolute;
  top: -12px;
  left: -12px;
  width: 34px;
  height: 34px;
  border: 1px dashed rgba(255,255,255,0.3);
  border-radius: 50%;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.cursor.click .cursor-inner {
  transform: scale(0.5);
}

/* mobile */
@media(max-width:500px){
  .card { margin: 12px; }
  .cursor { display: none; }
}
</style>
</head>

<body>

<div class="pixels"></div>

<div class="card">
  <h1>ZEROCACHE</h1>
  <div class="tagline">no cache, no limits.</div>

  <form id="regForm">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="tel" id="phone" placeholder="Phone Number" required>
    <input type="text" id="college" placeholder="College / University" required>
    <input type="text" id="course" placeholder="Course" required>
    <input type="text" id="year" placeholder="Year" required>
    <textarea id="work" placeholder="Work Details (optional)"></textarea>
    <input type="date" id="dob" required>
    <button type="submit">Join Zerocache</button>
  </form>

  <div id="status"></div>
</div>

<!-- Cursor -->
<div class="cursor" id="cursor">
  <div class="cursor-outer"></div>
  <div class="cursor-middle"></div>
  <div class="cursor-inner"></div>
</div>

<script>
/* ===== FORM ===== */
const scriptURL = "https://script.google.com/macros/s/AKfycbwKVv_iVLMe7sKx5af-U9QZD7c25K72uFtgJHWl5b839E5la5dmtomZSxYjXh_cYs7u/exec";
const discordURL = "https://discord.gg/Hz3KCKusWz";

document.getElementById("regForm").addEventListener("submit", function(e){
  e.preventDefault();
  document.getElementById("status").innerText = "Submitting...";

  const data = {
    name: name.value,
    email: email.value,
    phone: phone.value,
    college: college.value,
    course: course.value,
    year: year.value,
    work: work.value,
    dob: dob.value
  };

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(() => {
    document.getElementById("status").innerText = "Welcome to Zerocache";
    setTimeout(() => {
      window.location.href = discordURL;
    }, 1500);
  })
  .catch(() => {
    document.getElementById("status").innerText = "Submission failed.";
  });
});

/* ===== CURSOR ENGINE ===== */
const cursor = document.getElementById("cursor");
let mouseX = 0, mouseY = 0;
let curX = 0, curY = 0;

document.addEventListener("mousemove", e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

function animateCursor() {
  curX += (mouseX - curX) * 0.18;
  curY += (mouseY - curY) * 0.18;
  cursor.style.left = curX + "px";
  cursor.style.top = curY + "px";
  requestAnimationFrame(animateCursor);
}
animateCursor();

document.addEventListener("mousedown", () => cursor.classList.add("click"));
document.addEventListener("mouseup", () => cursor.classList.remove("click"));
</script>

</body>
</html>
